<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAV Thema module</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7f9;
      --card: #ffffff;
      --line: #dbe6ee;
      --text: #1f2933;
      --muted: #66788a;
      --ok: #166534;
      --ok-bg: #dcfce7;
      --bad: #991b1b;
      --bad-bg: #fee2e2;
      --budget: #16a34a;
      --nl: #2563eb;
      --aard: #0891b2;
      --gesch: #7c3aed;
      --praktijk: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 90px;
    }

    .hero, .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
    }

    .hero-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mascotte { width: 52px; height: 52px; object-fit: contain; }

    .hero h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .hero p { margin: 0; color: var(--muted); }

    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }

    .assignment {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      background: #fff;
    }

    .goal-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .goal-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #0f766e;
      background: #ccfbf1;
      border: 1px solid #99f6e4;
      border-radius: 999px;
      padding: 4px 10px;
    }

    .goal-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 4px 10px;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }

    .goal-chip { background: #ecfeff; color: #155e75; border-color: #a5f3fc; }

    h2, h3, h4 { margin: 0 0 10px; }

    .assignment p {
      margin: 8px 0;
      line-height: 1.45;
    }

    .img-box {
      margin: 10px 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f8fafc;
      padding: 10px;
      text-align: center;
    }

    .img-box img {
      width: 100%;
      max-height: 220px;
      object-fit: contain;
      border-radius: 8px;
    }

    .img-box-left img {
      margin-right: auto;
      max-width: 64%;
    }

    .img-box-right img {
      margin-left: auto;
      max-width: 64%;
    }

    .highlight {
      background: #fef08a;
      padding: 1px 5px;
      border-radius: 6px;
      font-weight: 700;
    }

    .steps {
      margin: 0 0 10px;
      padding-left: 18px;
      color: #334155;
    }

    .steps li { margin-bottom: 5px; }

    .field { margin-bottom: 10px; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 14px;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      font: inherit;
      background: #fff;
    }

    .btn, button {
      border: none;
      border-radius: 12px;
      padding: 11px 14px;
      color: #fff;
      background: #0f766e;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: 8px;
    }

    .btn:hover, button:hover { filter: brightness(0.95); }

    .feedback {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      display: none;
    }

    .ok { background: var(--ok-bg); color: var(--ok); display: block; }
    .bad { background: var(--bad-bg); color: var(--bad); display: block; }

    .summary-list { margin: 8px 0 0; padding-left: 18px; }

    .drag-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }

    .drag-grid .field { margin-bottom: 0; }

    .stat {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .reflectie {
      border-top: 1px dashed #cbd5e1;
      margin-top: 10px;
      padding-top: 10px;
    }

    .task-context {
      margin: 10px 0;
      padding: 10px 12px;
      border: 1px dashed #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
    }

    .task-context strong {
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hero h1 { font-size: 1.35rem; }
      .btn, button { width: 100%; text-align: center; }
      .img-box-left img,
      .img-box-right img { max-width: 100%; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero" id="hero"></section>

    <div class="grid">
      <section class="panel">
        <h2>Doelenoverzicht</h2>
        <p id="uitleg"></p>
        <h3>Praktisch scenario</h3>
        <p id="scenario"></p>

        <div class="stat">
          <strong>Voortgang:</strong> <span id="progressText">0/0 opdrachten voltooid</span><br>
          <strong>Score:</strong> <span id="scoreText">0%</span>
        </div>

      </section>
    </div>

    <section class="panel">
      <h2>Doelen in dit thema</h2>
      <div id="assignments"></div>
    </section>

    <a class="btn" style="background:#2f4858" href="leerling-dashboard.html">Ga naar mijn voortgang</a>
  </main>

<script>
const themes = {
  budget: {

    icon: '💶',
    uitleg: 'Je leert budgetteren, plannen en kiezen met echte kassabonnen en facturen.',
    scenario: 'Je bent met vrienden op stap en moet slim omgaan met je budget.'
  },
  nederlands: {

    scenario: 'Je legt uit wat veranderde in tijd en plaats en waarom dat belangrijk was.'
  },
  'praktische-vaardigheden': {

    color: '#f59e0b',

  }

const opdrachten = [
  {
    id: 'kassabon-supermarkt',
    type: 'kassabon',
    thema: 'budget',
    titel: 'Kassabon supermarkt lezen',
    vraag: 'Bekijk de kassabon. Bereken het totaal, tel de artikelen, zoek het duurste product en bereken wisselgeld bij €50.',
    antwoorden: ['totaal', 'aantal', 'duurste', 'wisselgeld'],
    correcteOplossing: 'Totaal €26,79 - 6 artikelen - duurste product: wasmiddel (€8,99) - wisselgeld €23,21.',
    feedback: 'Kijk naar de gemarkeerde bedragen: eerst totaal lezen, dan prijzen vergelijken, dan wisselgeld berekenen.',
    image: 'img/kassabonopdracht1.svg'
  },
  {
    id: 'budget-check',
    type: 'budgetteren',
    thema: 'budget',
    titel: 'Budget: kan je dit betalen?',
    vraag: 'Je hebt €30. De kassabon is €26,79. Kan je betalen? Hoeveel hou je over?',
    antwoorden: ['kanBetalen', 'over'],
    correcteOplossing: 'Ja, je kan betalen. €30 - €26,79 = €3,21 over.',
    feedback: 'Gebruik altijd de formule budget - kostprijs.',
    image: 'img/kassabonopdracht1.svg'
  },
  {
    id: 'factuur-lezen',
    type: 'factuur',
    thema: 'praktische-vaardigheden',
    titel: 'Factuur analyseren',
    vraag: 'Lees de factuur en vul subtotaal, BTW, totaal en vervaldatum in.',
    antwoorden: ['subtotaal', 'btw', 'totaal', 'vervaldatum'],
    correcteOplossing: 'Subtotaal €100,00 - BTW €21,00 - Totaal €121,00 - Vervaldatum 15/04/2026.',
    feedback: 'BTW = percentage van subtotaal. Totaal = subtotaal + BTW.',
    image: 'img/factuur.svg'
  },
  {
    id: 'btw-berekening',
    type: 'berekening',
    thema: 'budget',
    titel: 'BTW berekenen (21%)',
    vraag: 'Subtotaal €100. Bereken de BTW en het totaalbedrag stap voor stap.',
    antwoorden: ['btwLos', 'totaalLos'],
    correcteOplossing: 'BTW = 21% van 100 = 21. Totaal = 100 + 21 = €121.',
    feedback: 'Formule: subtotaal × 0,21 = BTW. Daarna optellen voor totaal.',
    image: 'img/factuur.svg'
  },
  {
    id: 'restaurant-groep',
    type: 'restaurantbon',
    thema: 'budget',
    titel: 'Restaurantbon: vrienden delen de rekening',
    vraag: '4 vrienden aten samen. Bereken totaal, belasting, subtotaal en of €200 genoeg is.',
    antwoorden: ['subrest', 'taxrest', 'totrest', 'kan200'],
    correcteOplossing: 'Subtotaal €138,00 - Belasting €16,56 (12%) - Totaal €154,56 - €200 is genoeg.',
    feedback: 'Controleer eerst subtotaal van alle consumpties, dan belasting, daarna totaal.',
    image: 'img/rekening-restaurant.svg'
  },
  {
    id: 'nederlands-factuur',
    type: 'taal',
    thema: 'nederlands',
    titel: 'Nederlands: woorden op een factuur',
    vraag: 'Wat betekent factuurnummer, wie is de klant en wat betekent BTW?',
    antwoorden: ['factuurnummer', 'klant', 'btwBetekenis', 'schrijfopdracht'],
    correcteOplossing: 'Factuurnummer = unieke code van factuur. Klant = persoon/bedrijf dat moet betalen. BTW = belasting over de toegevoegde waarde.',
    feedback: 'Gebruik je eigen woorden en verwijs naar gegevens op de factuur.',
    image: 'img/factuur.svg'
  },
  {
    id: 'kaart-opdracht',
    type: 'kaart',
    thema: 'aardrijkskunde',
    titel: 'Kaarten: België, Europa, wereld',
    vraag: 'Duid het juiste land aan per kaartcontext. Gebruik de wereldkaart hieronder of je atlas.',
    antwoorden: ['belgie', 'europa', 'wereld'],
    correcteOplossing: 'België ligt in West-Europa. Italië ligt in Zuid-Europa. Brazilië ligt in Zuid-Amerika.',
    feedback: 'Kijk naar continent, vorm en ligging op de kaart.',
    image: 'img/wereldkaart-opdracht.svg'
  },
  {
    id: 'geschiedenis-kaart',
    type: 'kaart-context',
    thema: 'geschiedenis',
    titel: 'Geschiedenis: kaart + context',
    vraag: 'Koppel de juiste historische context aan de kaartlocatie.',
    antwoorden: ['locatie', 'context'],
    correcteOplossing: 'Locatie: België. Context: industriële groei in 19e eeuw veranderde werk en leven in steden.',
    feedback: 'Denk aan plaats + tijd + wat er veranderde voor mensen.',
    image: 'img/kaart-belgie-context.svg'
  },
  {
    id: 'dragdrop-categorie',
    type: 'drag-drop',
    thema: 'praktische-vaardigheden',
    titel: 'Sleep producten naar categorie',
    vraag: 'Kies voor elk product de juiste categorie: eten, transport of technologie.',
    antwoorden: ['brood', 'busabonnement', 'koptelefoon'],
    correcteOplossing: 'Brood → eten, busabonnement → transport, koptelefoon → technologie.',
    feedback: 'Denk aan waar je het product voor gebruikt in het dagelijks leven.',
    image: 'img/kassabonopdracht1.svg'
  }
];

const q = new URLSearchParams(location.search).get('theme') || 'budget';
const theme = themes[q] || themes.budget;
const activeOpdrachten = opdrachten.filter(opdracht => opdracht.thema === q);

const hero = document.getElementById('hero');
hero.innerHTML = `<div class="hero-top"><img class="mascotte" src="img/pavomascotte.png" alt="PAVO mascotte"><div><h1>${theme.icon} ${theme.title}</h1><p>Eenvoudig, visueel, stap-voor-stap en met directe feedback.</p></div></div>`;
hero.style.borderTop = '6px solid ' + theme.color;
document.getElementById('uitleg').textContent = theme.uitleg;
document.getElementById('scenario').textContent = theme.scenario;

const stripMoney = (value) => parseFloat(String(value).replace(',', '.').replace(/[^0-9.-]/g, ''));
const norm = (value) => String(value || '').trim().toLowerCase();

function assignmentCard(opdracht) {
  const imagePosition = opdracht.imagePosition || 'center';
  const imageBoxClass = imagePosition === 'left'
    ? 'img-box img-box-left'
    : imagePosition === 'right'
      ? 'img-box img-box-right'
      : 'img-box';

  return `
    <article class="assignment" id="card-${opdracht.id}">
      <div class="goal-meta">
        <span class="goal-label">Doel ${opdracht.volgorde}</span>
        <span class="goal-chip">🧩 ${opdracht.type}</span>
      </div>
      <h3>${opdracht.titel}</h3>
      <p>${opdracht.vraag}</p>

      <div class="${imageBoxClass}">
        <img src="${opdracht.image}" alt="Afbeelding bij ${opdracht.titel}">
      </div>

      <div class="task-context">
        <strong>Opdrachtinformatie</strong>
        ${renderContext(opdracht)}
      </div>

      <ol class="steps">
        <li>Lees de opdracht en markeer de <span class="highlight">belangrijke info</span>.</li>
        <li>Reken of kies je antwoord.</li>
        <li>Klik op <strong>Controleer</strong> voor directe feedback.</li>
      </ol>

      ${renderInputs(opdracht)}

      <button onclick="checkOpdracht('${opdracht.id}')">Controleer</button>
      <div class="feedback" id="feedback-${opdracht.id}"></div>

      <div class="reflectie">
        <label for="reflectie-${opdracht.id}">Reflectie: wat heb je geleerd?</label>
        <textarea id="reflectie-${opdracht.id}" rows="2" placeholder="Bijvoorbeeld: ik kan nu BTW berekenen."></textarea>
      </div>
    </article>
  `;
}

function renderContext(opdracht) {
  if (opdracht.id === 'kassabon-supermarkt') {
    return `<p>
      Producten: melk €1,29 - brood €2,35 - pasta €1,99 - tomatensaus €2,49 - wasmiddel <span class="highlight">€8,99</span> - appels €3,69.<br>
      <strong>Totaal:</strong> <span class="highlight">€26,79</span>.
    </p>`;
  }
  if (opdracht.id === 'restaurant-groep') {
    return `<p>
      Noor: pasta €18 + water €3. Aziz: steak €26 + cola €4. Mila: salade €16 + sap €4. Jens: burger €22 + dessert €12 + water €3.<br>
      <strong>Belasting restaurant:</strong> <span class="highlight">12%</span>.
    </p>`;
  }
  if (opdracht.id === 'factuur-lezen' || opdracht.id === 'nederlands-factuur') {
    return `<p>
      Factuurnummer: F-2026-0412 · Klant: Sara Peeters · Subtotaal <span class="highlight">€100,00</span> · BTW <span class="highlight">21%</span> · Totaal €121,00 · Vervaldatum: <span class="highlight">15/04/2026</span>.
    </p>`;
  }
  if (opdracht.id === 'kaart-opdracht') {
    return '<p>Gebruik de <strong>wereldkaart</strong> hieronder. Twijfel je? Neem je atlas erbij en controleer continent + ligging.</p>';
  }
  if (opdracht.id === 'geschiedenis-kaart') {
    return '<p>Gebruik de kaart van België en je atlas: koppel plaats + tijd + context (19e eeuw, industrialisering).</p>';
  }
  return '<p>Gebruik de vraag, de afbeelding en je berekening om stap voor stap tot het juiste antwoord te komen.</p>';
}

function renderInputs(opdracht) {
  const f = (id, label, placeholder = '') => `<div class="field"><label for="${opdracht.id}-${id}">${label}</label><input id="${opdracht.id}-${id}" placeholder="${placeholder}"></div>`;

  if (opdracht.id === 'kassabon-supermarkt') {
    return [
      f('totaal', 'Hoeveel moet betaald worden?', '26,79'),
      f('aantal', 'Hoeveel artikelen zijn gekocht?', '6'),
      f('duurste', 'Wat is het duurste product?', 'wasmiddel'),
      f('wisselgeld', 'Wisselgeld bij betaling met €50?', '23,21')
    ].join('');
  }
  if (opdracht.id === 'budget-check') {
    return `
      <div class="field"><label for="${opdracht.id}-kanBetalen">Kan je betalen?</label>
        <select id="${opdracht.id}-kanBetalen"><option>kies...</option><option>ja</option><option>nee</option></select>
      </div>
      ${f('over', 'Hoeveel geld hou je over?', '3,21')}
    `;
  }
  if (opdracht.id === 'factuur-lezen') {
    return [
      f('subtotaal', 'Wat is het subtotaal?', '100'),
      f('btw', 'Hoeveel bedraagt de BTW?', '21'),
      f('totaal', 'Wat is het totaalbedrag?', '121'),
      f('vervaldatum', 'Wat is de vervaldatum?', '15/04/2026')
    ].join('');
  }
  if (opdracht.id === 'btw-berekening') {
    return [
      f('btwLos', 'Hoeveel is 21% van 100?', '21'),
      f('totaalLos', 'Wat is het totaalbedrag?', '121')
    ].join('');
  }
  if (opdracht.id === 'restaurant-groep') {
    return [
      f('subrest', 'Wat is het subtotaal?', '138'),
      f('taxrest', 'Wat is de belasting?', '16,56'),
      f('totrest', 'Wat is het totaal?', '154,56'),
      `<div class="field"><label for="${opdracht.id}-kan200">Je hebt €200: kan je betalen?</label>
        <select id="${opdracht.id}-kan200"><option>kies...</option><option>ja</option><option>nee</option></select>
      </div>`
    ].join('');
  }
  if (opdracht.id === 'nederlands-factuur') {
    return `
      ${f('factuurnummer', 'Wat betekent “factuurnummer”?', 'unieke code')}
      ${f('klant', 'Wie is de klant?', 'Sara Peeters')}
      ${f('btwBetekenis', 'Wat betekent “BTW”?', 'belasting op...')}
      <div class="field"><label for="${opdracht.id}-schrijfopdracht">Schrijfopdracht: “Leg uit wat een factuur is.”</label><textarea id="${opdracht.id}-schrijfopdracht" rows="3"></textarea></div>
    `;
  }
  if (opdracht.id === 'kaart-opdracht') {
    return `
      <div class="field"><label>Welk land is dit? “Hoofdstad Brussel, in West-Europa”</label><select id="${opdracht.id}-belgie"><option>kies...</option><option>België</option><option>Nederland</option><option>Frankrijk</option></select></div>
      <div class="field"><label>Welk land ligt in Zuid-Europa in de vorm van een laars?</label><select id="${opdracht.id}-europa"><option>kies...</option><option>Italië</option><option>Zweden</option><option>Polen</option></select></div>
      <div class="field"><label>Welk land ligt in Zuid-Amerika en is heel groot?</label><select id="${opdracht.id}-wereld"><option>kies...</option><option>Brazilië</option><option>Canada</option><option>Japan</option></select></div>
    `;
  }
  if (opdracht.id === 'geschiedenis-kaart') {
    return `
      <div class="field"><label>Welke locatie hoort bij dit verhaal?</label><select id="${opdracht.id}-locatie"><option>kies...</option><option>België</option><option>Australië</option><option>Japan</option></select></div>
      <div class="field"><label>Welke context past het best?</label><select id="${opdracht.id}-context"><option>kies...</option><option>Industriële groei veranderde werk en leven in steden</option><option>Alles bleef hetzelfde op het platteland</option><option>Er waren nog geen fabrieken</option></select></div>
    `;
  }
  return `
    <div class="drag-grid">
      <div class="field"><label>Brood</label><select id="${opdracht.id}-brood"><option>kies...</option><option>eten</option><option>transport</option><option>technologie</option></select></div>
      <div class="field"><label>Busabonnement</label><select id="${opdracht.id}-busabonnement"><option>kies...</option><option>eten</option><option>transport</option><option>technologie</option></select></div>
      <div class="field"><label>Koptelefoon</label><select id="${opdracht.id}-koptelefoon"><option>kies...</option><option>eten</option><option>transport</option><option>technologie</option></select></div>
    </div>
  `;
}

function isClose(value, expected, tolerance = 0.03) {
  return Math.abs(value - expected) <= tolerance;
}

function euro(value) {
  return `€${Number(value).toFixed(2).replace('.', ',')}`;
}

function detailsHtml(rows) {
  if (!rows.length) return '';
  const items = rows.map((row) => {
    const icon = row.correct ? '✅' : '❌';
    return `<li>${icon} <strong>${row.label}</strong>: jouw antwoord <em>${row.actual}</em> · correct: <strong>${row.expected}</strong></li>`;
  }).join('');
  return `<ul class="summary-list">${items}</ul>`;
}

function checkOpdracht(id) {
  const opdracht = opdrachten.find(o => o.id === id);
  const feedback = document.getElementById('feedback-' + id);
  let ok = false;
  let extra = '';
  const rows = [];

  if (id === 'kassabon-supermarkt') {
    const totaal = stripMoney(document.getElementById(`${id}-totaal`).value);
    const aantal = stripMoney(document.getElementById(`${id}-aantal`).value);
    const duurste = norm(document.getElementById(`${id}-duurste`).value);
    const wissel = stripMoney(document.getElementById(`${id}-wisselgeld`).value);
    const totaalOk = isClose(totaal, 26.79);
    const aantalOk = aantal === 6;
    const duursteOk = duurste.includes('was');
    const wisselOk = isClose(wissel, 23.21);
    rows.push(
      { label: 'Totaal', actual: isNaN(totaal) ? 'leeg' : euro(totaal), expected: euro(26.79), correct: totaalOk },
      { label: 'Aantal artikelen', actual: isNaN(aantal) ? 'leeg' : String(aantal), expected: '6', correct: aantalOk },
      { label: 'Duurste product', actual: duurste || 'leeg', expected: 'wasmiddel', correct: duursteOk },
      { label: 'Wisselgeld', actual: isNaN(wissel) ? 'leeg' : euro(wissel), expected: euro(23.21), correct: wisselOk }
    );
    ok = totaalOk && aantalOk && duursteOk && wisselOk;
  } else if (id === 'budget-check') {
    const kan = norm(document.getElementById(`${id}-kanBetalen`).value);
    const over = stripMoney(document.getElementById(`${id}-over`).value);
    const kanOk = kan === 'ja';
    const overOk = isClose(over, 3.21);
    rows.push(
      { label: 'Kan je betalen?', actual: kan || 'leeg', expected: 'ja', correct: kanOk },
      { label: 'Overblijvend bedrag', actual: isNaN(over) ? 'leeg' : euro(over), expected: euro(3.21), correct: overOk }
    );
    ok = kanOk && overOk;
  } else if (id === 'factuur-lezen') {
    const sub = stripMoney(document.getElementById(`${id}-subtotaal`).value);
    const btw = stripMoney(document.getElementById(`${id}-btw`).value);
    const totaal = stripMoney(document.getElementById(`${id}-totaal`).value);
    const datum = norm(document.getElementById(`${id}-vervaldatum`).value);
    const subOk = isClose(sub, 100);
    const btwOk = isClose(btw, 21);
    const totaalOk = isClose(totaal, 121);
    const datumOk = (datum === '15/04/2026' || datum === '15-04-2026');
    rows.push(
      { label: 'Subtotaal', actual: isNaN(sub) ? 'leeg' : euro(sub), expected: euro(100), correct: subOk },
      { label: 'BTW', actual: isNaN(btw) ? 'leeg' : euro(btw), expected: euro(21), correct: btwOk },
      { label: 'Totaal', actual: isNaN(totaal) ? 'leeg' : euro(totaal), expected: euro(121), correct: totaalOk },
      { label: 'Vervaldatum', actual: datum || 'leeg', expected: '15/04/2026', correct: datumOk }
    );
    ok = subOk && btwOk && totaalOk && datumOk;
  } else if (id === 'btw-berekening') {
    const btw = stripMoney(document.getElementById(`${id}-btwLos`).value);
    const totaal = stripMoney(document.getElementById(`${id}-totaalLos`).value);
    const btwOk = isClose(btw, 21);
    const totaalOk = isClose(totaal, 121);
    rows.push(
      { label: 'BTW (21% van 100)', actual: isNaN(btw) ? 'leeg' : euro(btw), expected: euro(21), correct: btwOk },
      { label: 'Totaalbedrag', actual: isNaN(totaal) ? 'leeg' : euro(totaal), expected: euro(121), correct: totaalOk }
    );
    ok = btwOk && totaalOk;
    extra = '<br><strong>Stap-voor-stap:</strong> 100 × 0,21 = 21, daarna 100 + 21 = 121.';
  } else if (id === 'restaurant-groep') {
    const sub = stripMoney(document.getElementById(`${id}-subrest`).value);
    const tax = stripMoney(document.getElementById(`${id}-taxrest`).value);
    const tot = stripMoney(document.getElementById(`${id}-totrest`).value);
    const can = norm(document.getElementById(`${id}-kan200`).value);
    const subOk = isClose(sub, 138);
    const taxOk = isClose(tax, 16.56, 0.05);
    const totOk = isClose(tot, 154.56, 0.05);
    const canOk = can === 'ja';
    rows.push(
      { label: 'Subtotaal', actual: isNaN(sub) ? 'leeg' : euro(sub), expected: euro(138), correct: subOk },
      { label: 'Belasting', actual: isNaN(tax) ? 'leeg' : euro(tax), expected: euro(16.56), correct: taxOk },
      { label: 'Totaal', actual: isNaN(tot) ? 'leeg' : euro(tot), expected: euro(154.56), correct: totOk },
      { label: 'Kan je betalen met €200?', actual: can || 'leeg', expected: 'ja', correct: canOk }
    );
    ok = subOk && taxOk && totOk && canOk;
  } else if (id === 'nederlands-factuur') {
    const fact = norm(document.getElementById(`${id}-factuurnummer`).value);
    const klant = norm(document.getElementById(`${id}-klant`).value);
    const btw = norm(document.getElementById(`${id}-btwBetekenis`).value);
    const schrijf = norm(document.getElementById(`${id}-schrijfopdracht`).value);
    const factOk = (fact.includes('code') || fact.includes('nummer'));
    const klantOk = klant.includes('sara');
    const btwOk = (btw.includes('belasting') || btw.includes('toegevoegde'));
    const schrijfOk = schrijf.length > 20;
    rows.push(
      { label: 'Betekenis factuurnummer', actual: fact || 'leeg', expected: 'unieke code/nummer', correct: factOk },
      { label: 'Wie is de klant?', actual: klant || 'leeg', expected: 'Sara Peeters', correct: klantOk },
      { label: 'Betekenis BTW', actual: btw || 'leeg', expected: 'belasting op toegevoegde waarde', correct: btwOk },
      { label: 'Schrijfopdracht', actual: schrijf ? 'ingevuld' : 'leeg', expected: 'minstens 1 duidelijke uitlegzin', correct: schrijfOk }
    );
    ok = factOk && klantOk && btwOk && schrijfOk;
  } else if (id === 'kaart-opdracht') {
    const b = norm(document.getElementById(`${id}-belgie`).value);
    const e = norm(document.getElementById(`${id}-europa`).value);
    const w = norm(document.getElementById(`${id}-wereld`).value);
    const bOk = b === 'belgië';
    const eOk = e === 'italië';
    const wOk = w === 'brazilië';
    rows.push(
      { label: 'West-Europa / Brussel', actual: b || 'leeg', expected: 'België', correct: bOk },
      { label: 'Laarsvorm in Zuid-Europa', actual: e || 'leeg', expected: 'Italië', correct: eOk },
      { label: 'Groot land in Zuid-Amerika', actual: w || 'leeg', expected: 'Brazilië', correct: wOk }
    );
    ok = bOk && eOk && wOk;
  } else if (id === 'geschiedenis-kaart') {
    const locatie = norm(document.getElementById(`${id}-locatie`).value);
    const context = norm(document.getElementById(`${id}-context`).value);
    const locatieOk = locatie === 'belgië';
    const contextOk = context.includes('industriële groei');
    rows.push(
      { label: 'Locatie', actual: locatie || 'leeg', expected: 'België', correct: locatieOk },
      { label: 'Historische context', actual: context || 'leeg', expected: 'Industriële groei veranderde werk en leven in steden', correct: contextOk }
    );
    ok = locatieOk && contextOk;
  } else if (id === 'dragdrop-categorie') {
    const brood = norm(document.getElementById(`${id}-brood`).value);
    const bus = norm(document.getElementById(`${id}-busabonnement`).value);
    const kop = norm(document.getElementById(`${id}-koptelefoon`).value);
    const broodOk = brood === 'eten';
    const busOk = bus === 'transport';
    const kopOk = kop === 'technologie';
    rows.push(
      { label: 'Brood', actual: brood || 'leeg', expected: 'eten', correct: broodOk },
      { label: 'Busabonnement', actual: bus || 'leeg', expected: 'transport', correct: busOk },
      { label: 'Koptelefoon', actual: kop || 'leeg', expected: 'technologie', correct: kopOk }
    );
    ok = broodOk && busOk && kopOk;
  }

  if (ok) {
    feedback.className = 'feedback ok';
    feedback.innerHTML = `✅ Goed gedaan! ${opdracht.correcteOplossing}${detailsHtml(rows)}${extra}`;
    saveProgress(id, true);
  } else {
    feedback.className = 'feedback bad';
    feedback.innerHTML = `⚠️ Nog niet juist. ${opdracht.feedback}${detailsHtml(rows)}${extra}`;
    saveProgress(id, false);
  }
}

opdrachten.forEach((opdracht, index) => {
  opdracht.volgorde = index + 1;
});

function saveProgress(id, solved) {
  const key = 'pav_progress_' + q;
  const current = JSON.parse(localStorage.getItem(key) || '{"done":{},"score":0}');
  if (solved) current.done[id] = true;
  const total = activeOpdrachten.length || 1;
  const doneCount = Object.keys(current.done).filter(doneId =>
    activeOpdrachten.some(opdracht => opdracht.id === doneId)
  ).length;
  current.score = Math.round((doneCount / total) * 100);
  localStorage.setItem(key, JSON.stringify(current));
  renderProgress();
}

function renderProgress() {
  const key = 'pav_progress_' + q;
  const current = JSON.parse(localStorage.getItem(key) || '{"done":{},"score":0}');
  const total = activeOpdrachten.length;
  const doneCount = Object.keys(current.done).filter(doneId =>
    activeOpdrachten.some(opdracht => opdracht.id === doneId)
  ).length;
  document.getElementById('progressText').textContent = `${doneCount}/${total} opdrachten voltooid`;
  const score = total ? Math.round((doneCount / total) * 100) : 0;
  document.getElementById('scoreText').textContent = `${score}%`;
}

document.getElementById('assignments').innerHTML = activeOpdrachten.length
  ? activeOpdrachten.map(assignmentCard).join('')
  : '<p>Geen opdrachten gevonden voor deze focus.</p>';
renderProgress();
</script>
