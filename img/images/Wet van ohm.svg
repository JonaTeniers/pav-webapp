<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Poster Wet van Ohm">
  <rect width="1200" height="700" fill="#f2f7fc"/>
  <rect x="20" y="20" width="1160" height="660" rx="18" fill="none" stroke="#3caabc" stroke-width="10"/>
  <rect x="90" y="80" width="1020" height="52" rx="12" fill="#4a73a3"/>
  <text x="600" y="116" font-size="38" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif" font-weight="700">WET VAN OHM</text>
  <polygon points="600,180 340,620 860,620" fill="#7dd3d8"/>
  <line x1="420" y1="460" x2="780" y2="460" stroke="white" stroke-width="6"/>
  <line x1="600" y1="460" x2="600" y2="620" stroke="white" stroke-width="6"/>
  <text x="600" y="365" font-size="78" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">U</text>
  <text x="470" y="560" font-size="62" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">I</text>
  <text x="730" y="560" font-size="62" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">R</text>
  <rect x="90" y="560" width="290" height="60" rx="14" fill="#3caabc"/>
  <rect x="455" y="560" width="290" height="60" rx="14" fill="#3caabc"/>
  <rect x="820" y="560" width="290" height="60" rx="14" fill="#3caabc"/>
  <text x="235" y="600" font-size="46" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">U = I × R</text>
  <text x="600" y="600" font-size="46" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">I = U : R</text>
  <text x="965" y="600" font-size="46" text-anchor="middle" fill="white" font-family="Nunito, Arial, sans-serif">R = U : I</text>
</svg>
