<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Thema 4 - Doel 11 (Procenten)</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #e3f2fd; padding: 2rem; margin: 0; }
    h1 { text-align: center; color: #1565c0; }
    .question-box { background: white; padding: 2rem; margin: 2rem auto; border-radius: 12px; max-width: 720px; box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1); }
    button { background: #1565c0; color: white; padding: 0.5rem 1rem; border: none; border-radius: 6px; margin-top: 1rem; cursor: pointer; font-size: 1rem; }
    .feedback { margin-top: 1rem; font-weight: bold; padding: 1rem; border-radius: 8px; }
    .success { background-color: #c8e6c9; color: #2e7d32; }
    .error { background-color: #ffcdd2; color: #c62828; }
    .nav-buttons { margin-top: 2rem; text-align: center; }
    .hidden { display: none; }
    .helper { color: #546e7a; font-size: 0.95rem; }
    .select-input, .text-input { padding: 0.4rem; font-size: 1rem; }
    .unit-header { max-width: 720px; margin: 0 auto 1.5rem; display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .unit-header a { text-decoration: none; font-weight: 700; }
    .back-link { color: #455a64; }
    .start-link { background: #1565c0; color: white; padding: 0.4rem 0.9rem; border-radius: 999px; }
  </style>
</head>
<body>
  <h1>Thema 4 - Doel 11: Procenten</h1>
  <div class="unit-header">
    <a class="back-link" href="oefenthema2.html">← Terug naar thema</a>
    <a class="start-link" href="#quizBox">Start oefenen</a>
  </div>
  <div class="question-box" id="quizBox">
    <h2 id="qCount">Vraag 1 van 10</h2>
    <p class="helper" id="qType"></p>
    <div id="questionText"></div>
    <form id="answerForm"></form>
    <button type="button" onclick="checkAnswer()">Controleer</button>
    <div class="feedback" id="feedback"></div>
    <div class="nav-buttons">
      <button id="nextBtn" class="hidden" type="button" onclick="nextQuestion()">Volgende vraag →</button>
    </div>
  </div>
  <div class="question-box hidden" id="endScreen">
    <h2>Doel voltooid!</h2>
    <p class="next-info">Goed gewerkt. Rond nu af met de herhaling (doel 12).</p>
    <p>Je behaalde <span id="xpScore">0</span> XP.</p>
    <div class="nav-buttons">
      <a href="oefenthema2.html"><button type="button">← Terug naar thema</button></a>
      <a href="thema4unit10.html"><button type="button">→ Naar herhaling</button></a>
    </div>
  </div>

  <script src="./firebase.js"></script>
  <script src="./pavo-xp-sync.js"></script>
  <script>
    const questions = [
      {"type":"mc","typeLabel":"Meerkeuze","question":"Welke breuk hoort bij 25%?","options":["1/2","1/4","3/4"],"correctIndex":1},
      {"type":"open","typeLabel":"Open vraag","question":"Hoeveel is 10% van 80?","accepted":["8"]},
      {"type":"drag","typeLabel":"Sleepoefening","question":"Kies de juiste koppeling.","options":["50% = 1/2","50% = 1/5","50% = 2/5"],"correctValue":"50% = 1/2"},
      {"type":"mc","typeLabel":"Meerkeuze","question":"In een klas van 20 leerlingen is 40% afwezig. Hoeveel leerlingen zijn afwezig?","options":["8","6","4"],"correctIndex":0},
      {"type":"open","typeLabel":"Open vraag","question":"Zet 75% om naar een breuk (vereenvoudigd).","accepted":["3/4"]},
      {"type":"drag","typeLabel":"Sleepoefening","question":"Welke uitspraak klopt over korting?","options":["20% korting op 50 euro is 10 euro korting","20% korting op 50 euro is 20 euro korting","20% korting op 50 euro is 5 euro korting"],"correctValue":"20% korting op 50 euro is 10 euro korting"},
      {"type":"mc","typeLabel":"Meerkeuze","question":"Wat is 5% van 200?","options":["5","10","20"],"correctIndex":1},
      {"type":"open","typeLabel":"Open vraag","question":"100% van 36 is ...","accepted":["36"]},
      {"type":"drag","typeLabel":"Sleepoefening","question":"Kies het juiste percentage voor de helft.","options":["50%","15%","5%"],"correctValue":"50%"},
      {"type":"open","typeLabel":"Open vraag","question":"Reflectie: waar kom je procenten vaak tegen?","accepted":["korting","winkel","resultaten","grafieken","nieuws","statistiek"]}
    ];

    let currentQuestion = 0;
    let score = 0;

    function renderOptions(options, name) {
      return options.map((opt, index) => (`<label><input type="radio" name="${name}" value="${index}"> ${opt}</label><br>`)).join('');
    }

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('qCount').innerText = `Vraag ${currentQuestion + 1} van ${questions.length}`;
      document.getElementById('qType').innerText = q.typeLabel;
      document.getElementById('questionText').innerText = q.question;
      const form = document.getElementById('answerForm');
      form.innerHTML = '';
      if (q.type === 'mc') form.innerHTML = renderOptions(q.options, 'answer');
      else if (q.type === 'open') form.innerHTML = `<input class="text-input" type="text" name="answer" placeholder="Typ je antwoord...">`;
      else if (q.type === 'drag') {
        const options = ['Kies...', ...q.options];
        form.innerHTML = `<select class="select-input" name="answer">${options.map((opt) => `<option value="${opt}">${opt}</option>`).join('')}</select>`;
      }
      document.getElementById('feedback').innerText = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtn').classList.add('hidden');
    }

    function normalize(value) { return value.trim().toLowerCase(); }

    function checkAnswer() {
      const q = questions[currentQuestion];
      let isCorrect = false;
      if (q.type === 'mc') {
        const selected = document.querySelector('input[name="answer"]:checked');
        if (!selected) return;
        isCorrect = Number(selected.value) === q.correctIndex;
      } else if (q.type === 'open') {
        const input = document.querySelector('input[name="answer"]');
        if (!input || !input.value.trim()) return;
        const normalized = normalize(input.value);
        isCorrect = q.accepted.some((answer) => normalize(answer) === normalized);
      } else if (q.type === 'drag') {
        const selected = document.querySelector('select[name="answer"]');
        if (!selected || selected.value === 'Kies...') return;
        isCorrect = normalize(selected.value) === normalize(q.correctValue);
      }

      const feedback = document.getElementById('feedback');
      if (isCorrect) {
        score += 3;
        feedback.innerText = '✅ Juist! +3 XP';
        feedback.classList.add('success');
      } else {
        feedback.innerText = '❌ Fout. Geen XP.';
        feedback.classList.add('error');
      }
      document.getElementById('nextBtn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        loadQuestion();
      } else {
        localStorage.setItem('thema4unit12', score);
        if (window.pavoSyncScore) window.pavoSyncScore('thema4unit12', score);
        document.getElementById('quizBox').classList.add('hidden');
        document.getElementById('endScreen').classList.remove('hidden');
        document.getElementById('xpScore').innerText = score;
      }
    }

    window.onload = loadQuestion;
  </script>
  <script src="./unit-navigation.js"></script>
</body>
</html>
