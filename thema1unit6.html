<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlasvaardigheidstoets</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Nunito',sans-serif; background:#eef3fb; }
header { background:#1a237e; color:white; text-align:center; padding:1rem; }

main { width:min(900px,95%); margin:1rem auto; }

.card { background:white; padding:1.2rem; border-radius:14px; margin-bottom:1rem; }

.image-options {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.option { border:2px solid #ddd; border-radius:12px; padding:10px; cursor:pointer; }
.option img { width:100%; height:140px; object-fit:cover; border-radius:8px; }
.option input { display:none; }
.option input:checked + img { outline:4px solid #1a237e; }

button { background:#1a237e; color:white; border:none; padding:.6rem 1rem; border-radius:8px; cursor:pointer; }
.feedback { margin-top:.5rem; font-weight:700; }

.hidden { display:none; }
</style>
</head>

<body>

<header>
<h1>🌍 Atlasvaardigheidstoets</h1>
<p id="timer">⏱️ Tijd start na vraag 1</p>
<p id="liveScore">Score: 0 XP</p>
</header>

<main>

<!-- VRAAG 1 -->
<div class="card">
<h2>Vraag 1</h2>

<div class="image-options">
<label class="option">
<input type="radio" name="q1" value="klimaat">
<img src="img/images/klimaatkaart.png">
</label>

<label class="option">
<input type="radio" name="q1" value="politiek">
<img src="img/images/politiekkaart.jpg">
</label>

<label class="option">
<input type="radio" name="q1" value="fysisch">
<img src="img/images/fysischekaart.jpg">
</label>
</div>

<input id="bron1" placeholder="Waar gevonden?">
<button onclick="startTest()">Start toets</button>
<div id="fb1" class="feedback"></div>
</div>

<!-- QUIZ -->
<div class="card hidden" id="quizBox">
<h2 id="qCount"></h2>
<p id="questionText"></p>

<input id="answer">
<input id="bron" placeholder="Waar gevonden?">

<button onclick="saveAnswer()">Opslaan</button>
<button onclick="nextQuestion()">Volgende</button>

<div id="feedback"></div>
</div>

<!-- EINDE -->
<div class="card hidden" id="endScreen">
<h2>Klaar!</h2>
<p id="eindFeedback"></p>
</div>

</main>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="./firebase.js"></script>

<script>

let score = 0;
let current = 0;
let antwoorden = [];
let startTime = null;
let timerStarted = false;
let timeLeft = 40 * 60;

const questions = [
{q:"Geef 2 buurlanden van België", a:["nederland","frankrijk","duitsland","luxemburg"], min:2},
{q:"Hoofdstad van Noorwegen", a:["oslo"], min:1},
{q:"Hoofdstad van Polen", a:["warschau"], min:1},
{q:"Welke landen naar Zweden?", a:["duitsland","denemarken"], min:2},
{q:"Welke zee ligt boven Nederland?", a:["noordzee"], min:1}
];

function normalize(v){ return v.toLowerCase().trim(); }

// START TOETS
function startTest(){
let val = document.querySelector('input[name="q1"]:checked')?.value;

if(!val){
fb1.innerText="Kies een antwoord";
return;
}

startTime = Date.now();
startTimer();

quizBox.classList.remove("hidden");
loadQuestion();
}

// TIMER
function startTimer(){
if(timerStarted) return;
timerStarted = true;

setInterval(()=>{
timeLeft--;

let m = Math.floor(timeLeft/60);
let s = timeLeft%60;

timer.innerText = `⏱️ ${m}:${s.toString().padStart(2,'0')}`;

if(timeLeft<=0) finishTest();

},1000);
}

// LOAD VRAAG
function loadQuestion(){
qCount.innerText=`Vraag ${current+1}/${questions.length}`;
questionText.innerText=questions[current].q;
answer.value="";
bron.value="";
}

// OPSLAAN ANTWOORD
function saveAnswer(){

let input = answer.value;
if(!input) return;

let parts = input.split(",").map(normalize);
let correct = parts.filter(p=>questions[current].a.includes(p));

if(correct.length>=questions[current].min){
score += 3;
if(bron.value) score += 1;
}

antwoorden.push({
vraag: questions[current].q,
antwoord: input,
bron: bron.value
});

liveScore.innerText = `Score: ${score} XP`;
feedback.innerText = "Antwoord opgeslagen";
}

// VOLGENDE
function nextQuestion(){
current++;
if(current<questions.length){
loadQuestion();
}else{
finishTest();
}
}

// EINDE + OPSLAAN
async function finishTest(){

quizBox.classList.add("hidden");
endScreen.classList.remove("hidden");

let duration = Math.floor((Date.now() - startTime)/1000);

eindFeedback.innerText = `${score} XP`;

await firebase.firestore().collection("results").add({
leerling: firebase.auth().currentUser?.email || "onbekend",
score: score,
duration: duration,
antwoorden: antwoorden,
timestamp: new Date()
});

}

</script>

</body>
</html>
