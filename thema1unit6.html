<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlasvaardigheidstoets</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Nunito',sans-serif; background:#eef3fb; }
header { background:#1a237e; color:white; text-align:center; padding:1rem; }

main { width:min(900px,95%); margin:1rem auto; }

.card {
  background:white;
  padding:1.2rem;
  border-radius:14px;
  margin-bottom:1rem;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* TIMER */
#timer {
  font-weight:800;
  font-size:1.2rem;
}

/* IMAGE OPTIONS */
.image-options {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.option {
  border:2px solid #ddd;
  border-radius:12px;
  padding:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.option img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.option input { display:none; }

.option span {
  display:block;
  margin-top:8px;
  font-weight:bold;
}

.option:hover {
  transform:scale(1.03);
  border-color:#3949ab;
}

.option input:checked + img {
  outline:4px solid #1a237e;
}

/* BUTTON */
button {
  background:#1a237e;
  color:white;
  border:none;
  padding:.6rem 1rem;
  border-radius:8px;
  cursor:pointer;
}

button:hover { background:#3949ab; }

.feedback { font-weight:700; margin-top:.5rem; }
.success { color:green; }
.error { color:red; }

input, textarea {
  width:100%;
  padding:.5rem;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>
<h1>🌍 Atlasvaardigheidstoets</h1>
<p>Gebruik je atlas om alle antwoorden te vinden 📖</p>
<p id="timer">⏱️ Tijd start na vraag 1</p>
<p id="liveScore">Score: 0 XP</p>
</header>

<main>

<!-- VRAAG 1 -->
<div class="card">
<h2>Vraag 1</h2>
<p><strong>Welke kaart gebruik je om reliëf te zien?</strong></p>

<div class="image-options">

<label class="option">
<input type="radio" name="q1" value="klimaat">
<img src="img/klimaatkaart.png">
<span>Klimaatkaart</span>
</label>

<label class="option">
<input type="radio" name="q1" value="politiek">
<img src="img/politiekkaart.jpg">
<span>Politieke kaart</span>
</label>

<label class="option">
<input type="radio" name="q1" value="fysisch">
<img src="img/fysischekaart.jpg">
<span>Fysische kaart</span>
</label>

</div>

<p>Waar heb je dit gevonden?</p>
<input id="bron1">

<button onclick="checkQ1()">Start toets</button>
<div id="fb1" class="feedback"></div>
</div>

<!-- QUIZ -->
<div class="card hidden" id="quizBox">
<h2 id="qCount"></h2>
<p id="questionText"></p>

<input id="answer">

<p>Waar heb je dit gevonden?</p>
<input id="bron">

<button onclick="checkAnswer()">Controleer</button>
<div id="feedback" class="feedback"></div>

<button id="nextBtn" class="hidden" onclick="nextQuestion()">Volgende →</button>
</div>

<!-- EINDE -->
<div class="card hidden" id="endScreen">
<h2>Klaar!</h2>
<p id="eindFeedback"></p>
</div>

</main>

<script>

let score = 0;
let timerStarted = false;
let timeLeft = 40 * 60; // 40 minuten

// TIMER FUNCTION
function startTimer(){
if(timerStarted) return;
timerStarted = true;

let interval = setInterval(() => {
timeLeft--;

let min = Math.floor(timeLeft / 60);
let sec = timeLeft % 60;

document.getElementById("timer").innerText =
`⏱️ ${min}:${sec.toString().padStart(2,'0')}`;

if(timeLeft <= 0){
clearInterval(interval);
finishTest();
}
},1000);
}

// ================= VRAAG 1 =================
function checkQ1(){
let val = document.querySelector('input[name="q1"]:checked')?.value;

if(!val){
fb1.innerText="⚠️ Kies een antwoord";
fb1.className="feedback error";
return;
}

if(val === "fysisch"){
score += 3;
if(bron1.value) score += 1;

fb1.innerText="✅ Start toets!";
fb1.className="feedback success";

startTimer();

document.getElementById("quizBox").classList.remove("hidden");
loadQuestion();

}else{
fb1.innerText="❌ Niet juist";
fb1.className="feedback error";
}
updateScore();
}

// ================= QUIZ =================

const questions = [
{
q:"Geef minstens 2 buurlanden van België",
a:["nederland","frankrijk","duitsland","luxemburg"],
min:2
},
{
q:"Wat is de hoofdstad van Noorwegen?",
a:["oslo"],
min:1
},
{
q:"Wat is de hoofdstad van Polen?",
a:["warschau"],
min:1
},
{
q:"Welke landen doorkruis je van België naar Zweden?",
a:["duitsland","denemarken"],
min:2
},
{
q:"Welke zee ligt ten noorden van Nederland?",
a:["noordzee"],
min:1
}
];

let current=0;

function normalize(v){
return v.toLowerCase().trim();
}

function loadQuestion(){
qCount.innerText=`Vraag ${current+2}/${questions.length+1}`;
questionText.innerText=questions[current].q;
answer.value="";
bron.value="";
feedback.innerText="";
nextBtn.classList.add("hidden");
}

function checkAnswer(){

let input = answer.value;
if(!input) return;

let parts=[...new Set(input.split(",").map(x=>normalize(x)))];
let correct=parts.filter(p=>questions[current].a.includes(p));

if(correct.length>=questions[current].min){

score += 3;
if(bron.value) score += 1;

feedback.innerText="✅ Juist!";
feedback.className="feedback success";

updateScore();
nextBtn.classList.remove("hidden");

}else{
feedback.innerText="❌ Nog niet juist";
feedback.className="feedback error";
}
}

function nextQuestion(){
current++;
if(current<questions.length){
loadQuestion();
}else{
finishTest();
}
}

function updateScore(){
liveScore.innerText = `Score: ${score} XP`;
}

// ================= EINDE =================

function finishTest(){
quizBox.classList.add("hidden");
endScreen.classList.remove("hidden");

let tekst = "";

if(score < 10){
tekst = `${score} XP → Oefen nog met de atlas`;
}else if(score < 20){
tekst = `${score} XP → Goed bezig`;
}else{
tekst = `${score} XP → Atlas expert 🏆`;
}

document.getElementById("eindFeedback").innerText = tekst;
}

</script>

</body>
</html>
