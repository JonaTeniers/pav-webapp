<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlasoefeningen Niveau 2</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Nunito',sans-serif; background:#eef3fb; }
header { background:#1a237e; color:white; text-align:center; padding:1rem; }
main { width:min(900px,95%); margin:1rem auto; }
.card { background:white; padding:1.2rem; border-radius:14px; margin-bottom:1rem; box-shadow:0 5px 15px rgba(0,0,0,.08); }
label { display:block; margin:.4rem 0; }
button { background:#1a237e; color:white; border:none; padding:.6rem 1rem; border-radius:8px; cursor:pointer; }
.feedback { font-weight:700; margin-top:.5rem; }
.success { color:green; }
.error { color:red; }
.hint { color:#444; font-style:italic; margin-top:.3rem; }
.hidden { display:none; }
input, textarea { width:100%; padding:.5rem; border-radius:8px; border:1px solid #ccc; }
</style>
</head>

<body>

<header>
<h1>Atlasoefeningen</h1>
<p>Niveau 2 – Denk, zoek en controleer</p>
</header>

<main>

<!-- BASIS -->
<div class="card">
<h2>Basisvaardigheden</h2>

<p><strong>1. Welke kaart gebruik je voor reliëf?</strong></p>
<label><input type="radio" name="q1" value="politiek"> Politieke kaart</label>
<label><input type="radio" name="q1" value="fysisch"> Fysische kaart</label>
<label><input type="radio" name="q1" value="klimaat"> Klimaatkaart</label>
<button onclick="checkQ1()">Controleer</button>
<div id="fb1" class="feedback"></div>
<div id="hint1" class="hint"></div>

<p><strong>2. In welke richting ligt Frankrijk t.o.v. België?</strong></p>
<label><input type="radio" name="q2" value="noord"> Noord</label>
<label><input type="radio" name="q2" value="zuid"> Zuid</label>
<label><input type="radio" name="q2" value="oost"> Oost</label>
<button onclick="checkQ2()">Controleer</button>
<div id="fb2" class="feedback"></div>
<div id="hint2" class="hint"></div>

</div>

<!-- QUIZ -->
<div class="card" id="quizBox">
<h2 id="qCount"></h2>
<p id="questionText"></p>
<input id="answer" placeholder="Gebruik komma's bij meerdere antwoorden">
<button onclick="checkAnswer()">Controleer</button>
<div id="feedback" class="feedback"></div>
<div id="hint" class="hint"></div>
<button id="nextBtn" class="hidden" onclick="nextQuestion()">Volgende →</button>
</div>

<!-- REFLECTIE -->
<div class="card hidden" id="reflectieBox">
<h2>Reflectie</h2>

<p><strong>Ligt Bastogne in Belgische Luxemburg of Groothertogdom?</strong></p>
<textarea></textarea>

<p><strong>Wat is een reliëfkaart?</strong></p>
<textarea></textarea>

<button onclick="finish()">Afronden</button>
</div>

<!-- EINDE -->
<div class="card hidden" id="endScreen">
<h2>Klaar!</h2>
<p>Score: <span id="xpScore"></span> XP</p>
</div>

</main>

<script>

// ================= BASISVRAGEN =================

function checkQ1(){
let val = document.querySelector('input[name="q1"]:checked')?.value;
if(val === "fysisch"){
fb1.innerText="✅ Juist!";
fb1.className="feedback success";
hint1.innerText="";
}else{
fb1.innerText="❌ Niet juist";
fb1.className="feedback error";
hint1.innerText="💡 Denk: waar zie je bergen en hoogte?";
}
}

function checkQ2(){
let val = document.querySelector('input[name="q2"]:checked')?.value;
if(val === "zuid"){
fb2.innerText="✅ Correct!";
fb2.className="feedback success";
hint2.innerText="";
}else{
fb2.innerText="❌ Kijk opnieuw";
fb2.className="feedback error";
hint2.innerText="💡 Kijk naar de kaart: Frankrijk ligt onder België";
}
}

// ================= QUIZ =================

const questions = [
{
q:"Geef 2 buurlanden van België",
a:["nederland","frankrijk","duitsland","luxemburg"],
min:2,
hint:"💡 België ligt tussen 4 landen"
},
{
q:"Hoofdstad van Noorwegen",
a:["oslo"],
min:1,
hint:"💡 Bekende Scandinavische hoofdstad"
},
{
q:"Hoofdstad van Polen",
a:["warschau"],
min:1,
hint:"💡 Moeilijke naam, begint met W"
},
{
q:"Welke landen doorkruist opa Marcel naar Zweden?",
a:["duitsland","denemarken"],
min:2,
hint:"💡 Denk aan de route naar Scandinavië"
},
{
q:"Noem 2 steden tussen Tienen en Oostende",
a:["brussel","gent","brugge"],
min:2,
hint:"💡 Grote Belgische steden op de lijn"
}
];

let current=0;
let score=0;
let correctAlready=false;

function normalize(v){
return v.toLowerCase().trim()
.replace("brusel","brussel")
.replace("warsaw","warschau");
}

function loadQuestion(){
qCount.innerText=`Vraag ${current+1}/${questions.length}`;
questionText.innerText=questions[current].q;
answer.value="";
feedback.innerText="";
hint.innerText="";
nextBtn.classList.add("hidden");
correctAlready=false;
}

function checkAnswer(){

if(correctAlready) return;

let input=answer.value;
if(!input) return;

let parts=input.split(",").map(x=>normalize(x));

let correct=parts.filter(p=>questions[current].a.includes(p));

if(correct.length>=questions[current].min){
score+=3;
feedback.innerText=`✅ Juist (${correct.length} goed)`;
feedback.className="feedback success";
correctAlready=true;
}else{
feedback.innerText="❌ Nog niet juist";
feedback.className="feedback error";
hint.innerText=questions[current].hint;
}

nextBtn.classList.remove("hidden");
}

function nextQuestion(){
current++;
if(current<questions.length){
loadQuestion();
}else{
quizBox.classList.add("hidden");
reflectieBox.classList.remove("hidden");
endScreen.classList.remove("hidden");
xpScore.innerText=score;
}
}

function finish(){
reflectieBox.classList.add("hidden");
}

window.onload=loadQuestion;

</script>

</body>
</html>
