<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlasvaardigheidstoets</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Nunito',sans-serif; background:#eef3fb; }
header { background:#1a237e; color:white; text-align:center; padding:1rem; }

main { width:min(900px,95%); margin:1rem auto; }

.card { background:white; padding:1.2rem; border-radius:14px; margin-bottom:1rem; }

/* TIMER */
#timer { font-weight:800; font-size:1.2rem; }

/* KAARTEN */
.image-options {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

.option {
  border:2px solid #ddd;
  border-radius:12px;
  padding:10px;
  cursor:pointer;
}

.option img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:8px;
}

.option input { display:none; }
.option input:checked + img { outline:4px solid #1a237e; }

button {
  background:#1a237e;
  color:white;
  border:none;
  padding:.6rem 1rem;
  border-radius:8px;
  cursor:pointer;
}

.feedback { margin-top:.5rem; font-weight:700; }

input {
  width:100%;
  padding:.5rem;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:5px;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>
<h1>🌍 Atlasvaardigheidstoets</h1>
<p>Gebruik je atlas om alle antwoorden te vinden 📖</p>
<p id="timer">⏱️ Tijd start na vraag 1</p>
<p id="liveScore">Score: 0 XP</p>
</header>

<main>

<!-- VRAAG 1 -->
<div class="card">
<h2>Vraag 1</h2>
<p><strong>Welke kaart gebruik je om hoogteverschillen (reliëf) te zien?</strong></p>

<div class="image-options">
<label class="option">
<input type="radio" name="q1" value="klimaat">
<img src="img/images/klimaatkaart.png">
</label>

<label class="option">
<input type="radio" name="q1" value="politiek">
<img src="img/images/politiekkaart.jpg">
</label>

<label class="option">
<input type="radio" name="q1" value="fysisch">
<img src="img/images/fysischekaart.jpg">
</label>
</div>

<input id="bron1" placeholder="Waar heb je dit gevonden in de atlas?">
<button onclick="startTest()">Start toets</button>
<div id="fb1" class="feedback"></div>
</div>

<!-- QUIZ -->
<div class="card hidden" id="quizBox">
<h2 id="qCount"></h2>
<p id="questionText"></p>

<input id="answer" placeholder="Geef je antwoord (gebruik komma's indien nodig)">
<input id="bron" placeholder="Waar heb je dit gevonden?">

<button onclick="saveAnswer()">Antwoord opslaan</button>
<button onclick="nextQuestion()">Volgende vraag</button>

<div id="feedback" class="feedback"></div>
</div>

<!-- EINDE -->
<div class="card hidden" id="endScreen">
<h2>Toets afgerond</h2>
<p id="eindFeedback"></p>
<button onclick="sluitToets()">Toets afsluiten</button>
</div>

</main>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="./firebase.js"></script>

<script>

let score = 0;
let current = 0;
let antwoorden = [];
let startTime = null;
let timerStarted = false;
let timeLeft = 40 * 60;
let timerInterval;

// VRAGEN (duidelijk geformuleerd)
const questions = [
{
q:"Geef minstens 2 buurlanden van België. Zoek dit op in de atlas.",
a:["nederland","frankrijk","duitsland","luxemburg"],
min:2
},
{
q:"Wat is de hoofdstad van Noorwegen? Gebruik de atlas om dit te vinden.",
a:["oslo"],
min:1
},
{
q:"Wat is de hoofdstad van Polen?",
a:["warschau"],
min:1
},
{
q:"Je rijdt met de auto van België naar Zweden. Door welke landen rijd je onderweg?",
a:["duitsland","denemarken"],
min:2
},
{
q:"Welke zee ligt ten noorden van Nederland?",
a:["noordzee"],
min:1
}
];

// START
function startTest(){
let val = document.querySelector('input[name="q1"]:checked')?.value;

if(!val){
fb1.innerText="⚠️ Kies eerst een kaart";
return;
}

if(val === "fysisch"){
score += 3;
if(bron1.value) score += 1;
}

startTime = Date.now();
startTimer();

quizBox.classList.remove("hidden");
loadQuestion();
updateScore();
}

// TIMER
function startTimer(){
if(timerStarted) return;
timerStarted = true;

timerInterval = setInterval(()=>{
timeLeft--;

let m = Math.floor(timeLeft/60);
let s = timeLeft%60;

timer.innerText = `⏱️ ${m}:${s.toString().padStart(2,'0')}`;

if(timeLeft<=0){
clearInterval(timerInterval);
finishTest();
}
},1000);
}

// LOAD
function loadQuestion(){
qCount.innerText=`Vraag ${current+2}/${questions.length+1}`;
questionText.innerText=questions[current].q;
answer.value="";
bron.value="";
feedback.innerText="";
}

// NORMALIZE
function normalize(v){
return v.toLowerCase().trim();
}

// OPSLAAN
function saveAnswer(){

let input = answer.value;
if(!input) return;

let parts = [...new Set(input.split(",").map(normalize))];
let correct = parts.filter(p=>questions[current].a.includes(p));

if(correct.length >= questions[current].min){
score += 3;
if(bron.value) score += 1;
}

antwoorden.push({
vraag: questions[current].q,
antwoord: input,
bron: bron.value,
juist: correct.length >= questions[current].min
});

feedback.innerText="Antwoord opgeslagen";
updateScore();
}

// VOLGENDE
function nextQuestion(){
current++;
if(current < questions.length){
loadQuestion();
}else{
finishTest();
}
}

// SCORE
function updateScore(){
liveScore.innerText = `Score: ${score} XP`;
}

// EINDE
async function finishTest(){

clearInterval(timerInterval);

quizBox.classList.add("hidden");
endScreen.classList.remove("hidden");

let duration = Math.floor((Date.now() - startTime)/1000);

eindFeedback.innerText = `Je score: ${score} XP`;

try{
await firebase.firestore().collection("results").add({
leerling: firebase.auth().currentUser?.email || "onbekend",
score: score,
duration: duration,
antwoorden: antwoorden,
timestamp: new Date()
});
}catch(e){
console.log("Opslaan mislukt:", e);
}
}

// SLUITEN
function sluitToets(){
clearInterval(timerInterval);
location.reload();
}

</script>

</body>
</html>
