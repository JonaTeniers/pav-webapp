<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leerling Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, sans-serif;
      margin: 0;
      background: #f6f8fb;
    }

    .wrap {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
    }

    .btn {
      background: #1d4ed8;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    .muted {
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="wrap">

  <!-- LOGIN -->
  <div class="card">
    <h2>Login leerling</h2>
    <form id="loginForm">
      <input id="naam" placeholder="Voornaam" required>
      <input id="klas" placeholder="Klas" required>
      <button class="btn">Open dashboard</button>
    </form>
    <p id="status" class="muted">Wacht op login...</p>
    <p id="activeUser"></p>
  </div>

  <!-- STATS -->
  <div class="card">
    <h3>Totaal XP</h3>
    <h1 id="xp">0</h1>
    <p>Aantal opdrachten: <span id="aantal">0</span></p>
  </div>

  <!-- TABEL -->
  <div class="card">
    <h2>Mijn resultaten</h2>
    <table>
      <thead>
        <tr>
          <th>Thema</th>
          <th>Unit</th>
          <th>Score</th>
          <th>Datum</th>
          <th>Actie</th>
        </tr>
      </thead>
      <tbody id="tabel">
        <tr><td colspan="5">Nog geen data</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<!-- JOUW CONFIG -->
<script src="./firebase.js"></script>

<!-- SCRIPT -->
<script>
const db = firebase.firestore();

let currentUser = null;

// LOGIN
document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const naam = document.getElementById("naam").value.trim().toLowerCase();
  const klas = document.getElementById("klas").value.trim().toLowerCase();

  currentUser = { naam, klas };

  document.getElementById("activeUser").innerText =
    "👤 " + naam + " (" + klas + ")";

  document.getElementById("status").innerText = "Dashboard laden...";

  loadData();
});


// DATA LADEN
function loadData() {

  db.collection("scores")
    .where("naam", "==", currentUser.naam)
    .where("klas", "==", currentUser.klas)
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      const tabel = document.getElementById("tabel");
      tabel.innerHTML = "";

      let totaalXP = 0;
      let aantal = 0;

      if (snapshot.empty) {
        tabel.innerHTML = `<tr><td colspan="5">Geen resultaten</td></tr>`;
        return;
      }

      snapshot.forEach(doc => {
        const d = doc.data();

        totaalXP += d.score;
        aantal++;

        tabel.innerHTML += `
          <tr>
            <td>${d.thema}</td>
            <td>${d.unit}</td>
            <td>${d.score}</td>
            <td>${formatDate(d.createdAt)}</td>
            <td>
              <a class="btn" href="${d.bronPagina}">
                Open
              </a>
            </td>
          </tr>
        `;
      });

      document.getElementById("xp").innerText = totaalXP;
      document.getElementById("aantal").innerText = aantal;

      document.getElementById("status").innerText =
        "✅ Dashboard geladen";
    });
}


// DATUM FORMAT
function formatDate(ts) {
  if (!ts) return "-";
  const d = ts.toDate();
  return d.toLocaleDateString("nl-BE") + " " +
         d.toLocaleTimeString("nl-BE", {hour: '2-digit', minute: '2-digit'});
}
</script>

</body>
</html>
