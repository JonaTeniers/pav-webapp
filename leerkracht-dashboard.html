<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PAV-O | Leerkracht Dashboard</title>

<style>
:root{--bg:#f6f8fb;--panel:#fff;--line:#dbe4ef;--text:#1f2b37;--muted:#64748b;--blue:#0b4da2}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:Inter,Segoe UI,sans-serif;color:var(--text)}
.wrap{max-width:1150px;margin:0 auto;padding:20px 16px 90px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.header{display:flex;align-items:center;gap:12px}
.header img{width:58px;height:58px;object-fit:contain}
.btn{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:9px 12px;font-weight:700;cursor:pointer}
input,select{padding:9px;border:1px solid #c9d5e7;border-radius:8px;width:100%}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #e8eef5;text-align:left}
th{font-size:.78rem;text-transform:uppercase;color:#5f6f82}
.bottom-nav{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:8px;background:#fff;border-top:1px solid var(--line);padding:10px}
.bottom-nav a{background:#3f5f73;color:#fff;text-decoration:none;text-align:center;padding:10px;border-radius:10px;font-size:12px}
</style>
</head>

<body>

<main class="wrap">

<section class="card header">
<img src="img/pavomascotte.png">
<div>
<h1>Leerkrachtdashboard</h1>
<p>Resultaten van toetsen</p>
</div>
</section>

<section class="card">
<h3>Resultaten</h3>

<table>
<thead>
<tr>
<th>Leerling</th>
<th>Score</th>
<th>Tijd</th>
<th>Datum</th>
</tr>
</thead>

<tbody id="scoresTableBody"></tbody>

</table>
</section>

</main>

<!-- 🔥 POPUP TOEGEVOEGD -->
<div id="detailModal" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:999;
">

<div style="
background:white;
margin:5% auto;
padding:20px;
width:90%;
max-width:700px;
border-radius:12px;
max-height:80vh;
overflow:auto;
">

<h2>Toets detail</h2>
<div id="detailContent"></div>

<br>
<button onclick="closeDetail()" class="btn">Sluiten</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="./firebase.js"></script>

<script>

const db = firebase.firestore();

// 🔥 RESULTATEN LADEN
async function loadResults(){

const snapshot = await db.collection("results").orderBy("timestamp","desc").get();

let html = "";

snapshot.forEach(doc=>{
const data = doc.data();

html += `
<tr onclick="openDetail('${doc.id}')" style="cursor:pointer">
<td>${data.leerling}</td>
<td>${data.score}</td>
<td>${Math.floor(data.duration/60)} min</td>
<td>${new Date(data.timestamp.seconds * 1000).toLocaleString()}</td>
</tr>
`;
});

document.getElementById("scoresTableBody").innerHTML = html;
}

// 🔥 DETAIL VIEW
async function openDetail(id){

const doc = await db.collection("results").doc(id).get();
const data = doc.data();

let html = `
<p><strong>Leerling:</strong> ${data.leerling}</p>
<p><strong>Score:</strong> ${data.score}</p>
<p><strong>Tijd:</strong> ${Math.floor(data.duration/60)} min ${data.duration%60} sec</p>
<hr>
<h3>Antwoorden</h3>
`;

data.antwoorden.forEach((a,i)=>{

html += `
<div style="
margin-bottom:12px;
padding:10px;
border-radius:8px;
background:${a.juist ? '#e8f5e9' : '#ffebee'};
">

<strong>Vraag ${i+1}:</strong><br>
${a.vraag}<br><br>

<strong>Antwoord:</strong><br>
${a.antwoord}<br><br>

<strong>Bron:</strong><br>
${a.bron || "-"}

</div>
`;
});

document.getElementById("detailContent").innerHTML = html;
document.getElementById("detailModal").style.display = "block";
}

// SLUITEN
function closeDetail(){
document.getElementById("detailModal").style.display = "none";
}

// START
loadResults();

</script>

</body>
</html>
