<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAV Thema</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme-page.css" />
</head>
<body data-theme-id="hoofdthema9">
  <div class="theme-shell">
    <main class="theme-main">
      <section class="theme-header">
        <div class="header-row">
          <h1 class="theme-title" id="themeTitle">Thema</h1>
          <a class="home-btn" href="index.html">← Terug naar home</a>
        </div>
        <div class="progress-meta">
          <span>Voortgang</span>
          <strong id="progressPercent">0%</strong>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

        <section class="theme-info-box">
          <h3 id="themeInfoTitle">Thema-info</h3>
          <p id="themeInfoText">Hier vind je context en tips voor dit thema.</p>
          <a id="courseButton" class="course-btn" href="#">Open cursus</a>
        </section>
      </section>

      <section>
        <h2>Metro leerlijn</h2>
        <div class="metro-line" id="metroLine"></div>
      </section>

      <section>
        <h2>Doelen overzicht</h2>
        <div class="goals-overview" id="goalsOverview"></div>
      </section>

      <section class="assignment-view" id="assignmentView"></section>
    </main>

    <aside class="theme-side">
      <h2 class="ovur-title">OVUR per doel</h2>
      <div class="ovur-grid" id="ovurGrid"></div>
    </aside>
  </div>

  <script src="theme-page.js"></script>
</body>
</html>
